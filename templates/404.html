{% extends "layout.html" %}
{% block title %}페이지를 찾을 수 없습니다{% endblock %}
{% block content %}
<div class="error-page">
  <div class="error-num">404</div>
  <h1 class="error-title">페이지를 찾을 수 없습니다</h1>
  <p class="error-sub">찾으시는 페이지가 사라졌거나, 주소가 바뀌었을 수 있습니다.</p>
  <a href="{{ url_for('index') }}" class="btn-primary">홈으로 돌아가기</a>
</div>
{% endblock %}
