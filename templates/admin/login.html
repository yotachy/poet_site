{% extends "layout.html" %}
{% block title %}관리자 로그인{% endblock %}
{% block content %}
<div class="admin-login-wrap">
  <div class="admin-login-box">
    <h1 class="admin-logo">관리자</h1>
    <form method="post" class="admin-login-form">
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" name="password" placeholder="비밀번호를 입력하세요" autofocus required>
      </div>
      <button type="submit" class="btn-primary full">로그인</button>
    </form>
    <a href="{{ url_for('index') }}" class="admin-back">← 홈으로</a>
  </div>
</div>
{% endblock %}
